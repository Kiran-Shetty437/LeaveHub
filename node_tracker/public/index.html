<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Project Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Toast Notification Area -->
        <div id="toast-container"></div>
        
        <!-- Connection Status -->
        <div id="connection-status" class="offline">Offline</div>

        <!-- Auth Section -->
        <div id="auth-section" class="container">
            <div class="card">
                <h2>Login / Signup</h2>
                <p>Use "admin" for Admin Dashboard, or any name for User Dashboard</p>
                <form id="auth-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn">Access Dashboard</button>
                </form>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="container hidden">
            <div class="header">
                <h2>Project Dashboard (<span id="user-role-display"></span>)</h2>
                <button id="logout-btn" class="btn btn-outline">Logout</button>
            </div>
            
            <!-- User specific: Add Project -->
            <div id="add-project-card" class="card hidden">
                <h3>Submit New Project</h3>
                <form id="project-form">
                    <div class="form-group">
                        <label>Project Name</label>
                        <input type="text" id="proj-name" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="proj-desc" required></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Project</button>
                </form>
            </div>

            <div class="projects-container">
                <h3>Projects</h3>
                <div id="projects-list" class="grid">
                    <!-- Projects injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
