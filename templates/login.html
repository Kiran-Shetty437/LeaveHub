{% extends "base.html" %}

{% block title %}Login | CampusCore{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--bg-main);">
    <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2.5rem; border-top: 4px solid var(--primary); box-shadow: var(--shadow-lg) !important;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 56px; height: 56px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem; color: var(--primary);">
                <i class="fas fa-lock"></i>
            </div>
            <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.025em;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">Sign in to your account</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <input type="text" name="username" id="username" class="form-control" style="padding-left: 40px;" placeholder="john_doe" required>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-key" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <input type="password" name="password" id="password" class="form-control" style="padding-left: 40px;" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="glow-button" style="width: 100%; padding: 12px !important; font-size: 1rem;">
                Sign In
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.85rem;">
                Need help? <a href="#" style="color: var(--primary); font-weight: 500;">Contact Admin</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block page_title %}{% endblock %}
