{% extends "base.html" %}

{% block title %}Login | LeaveHub{% endblock %}

{% block content %}
<div
    style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent), radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.15), transparent);">
    <div class="glass-card"
        style="width: 100%; max-width: 420px; padding: 3rem 2.5rem; border-top: 2px solid rgba(59, 130, 246, 0.3);">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div
                style="width: 64px; height: 64px; background: var(--accent-gradient); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 1.5rem; color: white; box-shadow: 0 10px 20px var(--primary-glow);">
                <i class="fas fa-lock"></i>
            </div>
            <h2 style="font-size: 1.75rem; font-weight: 700; color: white; letter-spacing: -0.5px;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 8px;">Access the Leave Management Portal
            </p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <input type="text" name="username" id="username" class="form-control" style="padding-left: 45px;"
                        placeholder="john_doe" required>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-key"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
                    <input type="password" name="password" id="password" class="form-control"
                        style="padding-left: 45px;" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="glow-button" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Sign In <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
            </button>
        </form>

        <div
            style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-glass); padding-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.85rem;">
                Need help? <a href="#" style="color: var(--primary); font-weight: 600; text-decoration: none;">Contact
                    Admin</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block page_title %}{% endblock %}
