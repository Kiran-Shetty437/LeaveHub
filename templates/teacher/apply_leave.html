{% extends "base.html" %}

{% block title %}Apply for Leave - LeaveSystem{% endblock %}
{% block page_title %}Apply for Leave (Teacher Roll){% endblock %}

{% block content %}
<div class="form-container">
    <form id="leaveForm" action="{{ url_for('apply_leave') }}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="dates">Leave Dates</label>
            <input type="text" name="dates" id="dates" class="form-control" placeholder="DD-MM-YYYY or DD-MM-YYYY to DD-MM-YYYY" required>
            <small style="color: var(--text-muted);">Format: 01-05-2024 or 01-05-2024 to 03-05-2024</small>
        </div>
        <div class="form-group">
            <label for="reason">Reason for Leave</label>
            <textarea name="reason" id="reason" class="form-control" rows="5" placeholder="Explain your reason clearly..." required></textarea>
        </div>
        <div class="form-group">
            <label for="document">Attachment (Optional - PDF/Image)</label>
            <input type="file" name="document" id="document" class="form-control" accept=".pdf,.png,.jpg,.jpeg">
        </div>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i> Submit Request
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn" style="background: #e2e8f0; color: var(--text-main);">Cancel</a>
        </div>
    </form>
</div>

<script>
document.getElementById('leaveForm').onsubmit = function(e) {
    const datesInput = document.getElementById('dates').value.trim();
    // Regex for DD-MM-YYYY or DD-MM-YYYY to DD-MM-YYYY
    const pattern = /^\d{2}-\d{2}-\d{4}( to \d{2}-\d{2}-\d{4})?$/;
    
    if (!pattern.test(datesInput)) {
        alert("Invalid Date Pattern!\nPlease use: DD-MM-YYYY\nOr: DD-MM-YYYY to DD-MM-YYYY");
        return false;
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let startDateStr = datesInput;
    if (datesInput.includes(' to ')) {
        startDateStr = datesInput.split(' to ')[0];
    }

    // Convert DD-MM-YYYY to YYYY-MM-DD for JavaScript Date constructor
    const parts = startDateStr.split('-');
    const formattedStartDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
    const startDate = new Date(formattedStartDate);

    if (isNaN(startDate.getTime())) {
        alert("Invalid Date value!");
        return false;
    }

    if (startDate < today) {
        alert("Error: Cannot apply for past dates!");
        return false;
    }

    return true;
};
</script>
{% endblock %}
